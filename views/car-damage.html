<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Car Damage Overlay</title>
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="/styles-car-damage.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/textfit@2.4.0/textFit.min.js"></script>
    <script src="/utils/driver-utils.js"></script>
</head>
<body>
    <!--
    Overlay canvas: 280 × 600 px.
    Car model elements live inside #cd-car-container (CSS scale 0.75, placed at left:27.5 top:141.25).
    All child coordinates inside #cd-car-container and #cd-mfd-container are native (pre-scale) SimHub values.
    -->
    <div class="overlay-container">

        <!-- ── Background: 280×510 at top:90, rgb(18,20,26) ── -->
        <div id="cd-bg"></div>

        <!-- ── Top title gradient: 280×90 at top:0 ── -->
        <div class="cd-gradient" id="cd-gradient-top"></div>

        <!-- ── Title: 280×90 at top:0 ── -->
        <!-- Slides in when the overlay shows; slides out after ~8 s or when the overlay hides. -->
        <div id="cd-title"><span>CAR</span><span>DAMAGE</span></div>

        <!-- ── Info gradient: 280×50 at top:90 ── -->
        <div class="cd-gradient" id="cd-gradient-info"></div>

        <!-- ── Driver last name: 280×40 top:90 ── -->
        <!-- F1TV-2022 ObliqueBold 25px; colour set dynamically from team/livery data -->
        <div id="cd-driver-name">PLAYER</div>

        <!-- ═══════════════════════════════════════════════════════════════════
             CAR MODEL (300×450 canvas → scale 0.75)
             Placed at (27.5, 141.25) on the overlay.
             All child coords are native (pre-scale) values from SimHub source.
             ═══════════════════════════════════════════════════════════════════ -->
        <div id="cd-car-container">

            <!-- Stroke guide corners -->
            <!-- TL: 20×20 at (40,105)   TR: 20×20 at (235,105) -->
            <!-- BL: 20×20 at (40,370)   BR: 20×20 at (235,370) -->
            <div class="cd-guide" id="cd-guide-tl"></div>
            <div class="cd-guide" id="cd-guide-tr"></div>
            <div class="cd-guide" id="cd-guide-bl"></div>
            <div class="cd-guide" id="cd-guide-br"></div>

            <!-- Tyre wear % text -->
            <!-- FL: 65×30 at (5,130)   FR: 65×30 at (225,130) -->
            <!-- RL: 65×30 at (5,330)   RR: 65×30 at (225,330) -->
            <div class="cd-wear-pct" id="cd-pct-fl">0%</div>
            <div class="cd-wear-pct" id="cd-pct-fr">0%</div>
            <div class="cd-wear-pct" id="cd-pct-rl">0%</div>
            <div class="cd-wear-pct" id="cd-pct-rr">0%</div>

            <!-- MFD widget (164×450, centered at left:65) -->
            <div id="cd-mfd-container">

                <!-- Frame ×2: 101×235 at (32, 13) opacity 0.35 -->
                <img class="cd-car-part" id="cd-frame-a" src="/images/car-damage/car_front.png" alt="">
                <img class="cd-car-part" id="cd-frame-b" src="/images/car-damage/car_front.png" alt="">

                <!-- Deflectors: 95.9×35 at (34.05, 144) opacity 0.35 -->
                <img class="cd-car-part" id="cd-deflectors" src="/images/car-damage/deflectors.png" alt="">

                <!-- LfWing   :  79.9×71.4   at (2,     0)   -->
                <!-- RfWing   :  79.9×71.4   at (83,    0)   -->
                <!-- Floor    :  134.3×210.8 at (15,  164)   -->
                <!-- LSidepod :  45.9×145.35 at (27,  229)   -->
                <!-- RSidepod :  45.9×145.35 at (92,  229)   -->
                <!-- Diffuser : 62.9×21.25  at (50.55,381)  -->
                <!-- rWing    : 103.7×44.2  at (30.15,405)  -->
                <!-- Engine   : 52×61       at (56,  255)   -->
                <img class="cd-car-part" id="cd-lf-wing"   src="/images/car-damage/LfWingGreen.png"   alt="">
                <img class="cd-car-part" id="cd-rf-wing"   src="/images/car-damage/RfWingGreen.png"   alt="">
                <img class="cd-car-part" id="cd-floor"     src="/images/car-damage/FloorGreen.png"    alt="">
                <img class="cd-car-part" id="cd-l-sidepod" src="/images/car-damage/LsidepodGreen.png" alt="">
                <img class="cd-car-part" id="cd-r-sidepod" src="/images/car-damage/RsidepodGreen.png" alt="">
                <img class="cd-car-part" id="cd-diffuser"  src="/images/car-damage/DiffuserGreen.png" alt="">
                <img class="cd-car-part" id="cd-rear-wing" src="/images/car-damage/rWingGreen.png"    alt="">
                <img class="cd-car-part" id="cd-engine"    src="/images/car-damage/EngineGreen.png"   alt="">

                <!-- Gearbox: 15×54 r2 border:3 at (75, 320) -->
                <div class="cd-dmg-pair" id="cd-gearbox">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>

                <!-- FL Tyre  : 32×60 r8 border:3 at (3,   76) -->
                <!-- FL Brake : 9×21  r2 border:3 at (36,  95) -->
                <div class="cd-dmg-pair" id="cd-tyre-fl">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>
                <div class="cd-dmg-pair" id="cd-brake-fl">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>

                <!-- FR Tyre  : 32×60 r8 border:3 at (132, 76) -->
                <!-- FR Brake : 9×21  r2 border:3 at (122, 95) -->
                <div class="cd-dmg-pair" id="cd-tyre-fr">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>
                <div class="cd-dmg-pair" id="cd-brake-fr">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>

                <!-- RR Tyre  : 34×60 r8 border:3 at (130, 359) -->
                <!-- RR Brake : 12×21 r2 border:3 at (116, 381) -->
                <div class="cd-dmg-pair" id="cd-tyre-rr">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>
                <div class="cd-dmg-pair" id="cd-brake-rr">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>

                <!-- RL Tyre  : 34×60 r8 border:3 at (0,  359) -->
                <!-- RL Brake : 12×21 r2 border:3 at (36, 381) -->
                <div class="cd-dmg-pair" id="cd-tyre-rl">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>
                <div class="cd-dmg-pair" id="cd-brake-rl">
                    <div class="cd-pair-bg"></div>
                    <div class="cd-pair-stk"></div>
                </div>

            </div><!-- #cd-mfd-container -->

        </div><!-- #cd-car-container -->

        <!-- ── Compound area gradient: 280×50 at top:485 ── -->
        <div class="cd-gradient" id="cd-gradient-compound"></div>

        <!-- ── Tyre Compound: 280×35 left:-5 top:485 center ── -->
        <!-- F1TV-2022 ObliqueBold 30px compound colour -->
        <div id="cd-compound">NO DATA</div>

        <!-- ── Tyre Age: 280×30 centered top:520, num (bold white) + LAPS (grey) ── -->
        <div id="cd-tyre-age"><span id="cd-tyre-age-num">0</span><span id="cd-tyre-age-laps"> LAPS</span></div>

        <!-- ── Wear scale bar ── -->
        <!-- Green  : 70×8   at (27.5,  555) rgb(0,255,0)        -->
        <!-- Orange : 70×8   at (97.5,  555) rgb(175,122,37)     -->
        <!-- Red    :  70.2×8 at (167.5, 555) rgb(255,0,0)        -->
        <div id="cd-wb-green"></div>
        <div id="cd-wb-orange"></div>
        <div id="cd-wb-red"></div>

        <!-- Marker lines -->
        <!-- left  : border-left  20×15 at (27.5,  555) -->
        <!-- mid   : border-left  20×14 at (132.5, 556) -->
        <!-- right : border-right 20×15 at (217.5, 555) -->
        <div class="cd-wb-marker" id="cd-wbm-left"></div>
        <div class="cd-wb-marker" id="cd-wbm-mid"></div>
        <div class="cd-wb-marker" id="cd-wbm-right"></div>

        <!-- Wear scale labels + % combined -->
        <!-- "0"   : 60×20 at (-2.5,  575) -->
        <!-- "50"  : 70×20 at (97.5,  575) -->
        <!-- "100" : 60×20 at (197.5, 575) -->
        <div class="cd-wb-label" id="cd-wbl-0">0<span class="cd-wb-pct-inline">%</span></div>
        <div class="cd-wb-label" id="cd-wbl-50">50<span class="cd-wb-pct-inline">%</span></div>
        <div class="cd-wb-label" id="cd-wbl-100">100<span class="cd-wb-pct-inline">%</span></div>

    </div>

    <script>
        const socket = io();
        socket.emit('identify', 'Car Damage');

        const overlayContainer = document.querySelector('.overlay-container');

        // ── Tyre compound lookup ──────────────────────────────────────────────
        const VISUAL_COMPOUND = {
            7:  { code: 'INTER',  color: '#31AF49' },
            8:  { code: 'WET',  color: '#0073AD' },
            15: { code: 'WET',  color: '#0073AD' },
            16: { code: 'SOFT',  color: '#EC1C24' },
            17: { code: 'MEDIUM',  color: '#FFD604' },
            18: { code: 'HARD',  color: '#F0F0EC' },
            19: { code: 'SUPERSOFT', color: '#97528F' },
            20: { code: 'SOFT',  color: '#EC1C24' },
            21: { code: 'MEDIUM',  color: '#FFD604' },
            22: { code: 'HARD',  color: '#F0F0EC' }
        };

        // ── Driver / team state ───────────────────────────────────────────────
        let teamNames     = {};
        let driversData   = {};
        let customDrivers = [];
        let formulaType   = DriverUtils.FORMULA_TYPE.F1_MODERN;
        let playerIndex   = -1;
        let currentTeamId = null;
        let primaryColor  = null;
        let drsFault      = 0;
        let rearWingDmg   = 0;

        // ── Auto-display state ────────────────────────────────────────────────
        let cdConfig = { autoDisplay: false, autoMode: 'never', showRemainingLife: true, useTeamColor: true };
        let autoHideTimer       = null;
        let dmgStateInitialized = false;
        let prevDmgState        = {};
        let previousVisibility  = false;

        async function loadDriverData() {
            try {
                const data = await DriverUtils.loadDriverData(formulaType);
                customDrivers = data.customDrivers;
                teamNames     = data.teamNames;
            } catch (e) {
                console.error('[CarDamage] Error loading driver data:', e);
            }
        }

        // ── Driver name colour ────────────────────────────────────────────────
        function updateDriverNameColor() {
            const el = document.getElementById('cd-driver-name');
            if (!el) return;
            if (!cdConfig.useTeamColor) {
                el.style.color = 'rgb(255, 255, 255)';
                return;
            }
            if (currentTeamId !== null && teamNames?.[currentTeamId]?.OverridePrimaryColor) {
                el.style.color = teamNames[currentTeamId].OverridePrimaryColor;
            } else if (primaryColor) {
                el.style.color = primaryColor;
            }
        }

        // ── Colour helpers ────────────────────────────────────────────────────
        /** Wings, Diffuser, Rear Wing: <1%=Green, <50%=Yellow, ≥50%=Red */
        function partVariant(pct) {
            if (pct < 1)   return 'Green';
            if (pct < 50)  return 'Yellow';
            return 'Red';
        }

        /** Floor, Sidepods, Brakes: <25%=Green, <50%=Yellow, ≥50%=Red */
        function heavyPartVariant(pct) {
            if (pct < 25)  return 'Green';
            if (pct < 50)  return 'Yellow';
            return 'Red';
        }

        /** Engine: <50%=Green, 50–70%=Yellow, 70–90%=Orange, ≥90%=Red */
        function engineVariant(pct) {
            if (pct < 50)  return 'Green';
            if (pct < 70)  return 'Yellow';
            if (pct < 90)  return 'Orange';
            return 'Red';
        }

        /** Base pair-colour applier — takes a pre-computed "r, g, b" string. */
        function applyPairColor(id, rgb) {
            const el = document.getElementById(id);
            if (!el) return;
            el.querySelector('.cd-pair-bg').style.backgroundColor = `rgba(${rgb}, 0.3)`;
            el.querySelector('.cd-pair-stk').style.borderColor    = `rgb(${rgb})`;
        }

        /** Brakes / Floor-style pair: <25%=green, <50%=yellow, ≥50%=red */
        function heavyDmgRgb(pct) {
            if (pct < 25) return '0, 255, 0';
            if (pct < 50) return '255, 215, 0';
            return '255, 0, 0';
        }

        /** Gearbox pair: same thresholds but yellow is #ffae00 */
        function gearboxDmgRgb(pct) {
            if (pct < 25) return '0, 255, 0';
            if (pct < 50) return '255, 174, 0';
            return '255, 0, 0';
        }

        function updatePartImage(id, base, pct, variantFn = partVariant) {
            const img = document.getElementById(id);
            if (img) img.src = `/images/car-damage/${base}${variantFn(pct)}.png`;
        }

        function updateRearWing() {
            const img = document.getElementById('cd-rear-wing');
            if (!img) return;
            img.src = `/images/car-damage/rWing${drsFault ? 'Red' : partVariant(rearWingDmg)}.png`;
        }

        /**
         * Smoothly interpolates tyre wear colour across three stops:
         *   0%  wear → #00FF00 (green)
         *   30% wear → #FFD700 (yellow)
         *   70% wear → #FF0000 (red)
         * Returns a bare "r, g, b" string usable in both rgb() and rgba().
         */
        function wearRgbStr(pct) {
            const lerp = (a, b, t) => Math.round(a + (b - a) * t);
            let r, g, b;
            if (pct <= 30) {
                const t = pct / 30;
                r = lerp(0x00, 0xFF, t);
                g = lerp(0xFF, 0xD7, t);
                b = 0;
            } else {
                const t = Math.min((pct - 30) / 40, 1);
                r = 0xFF;
                g = lerp(0xD7, 0x00, t);
                b = 0;
            }
            return `${r}, ${g}, ${b}`;
        }

        function wearTextColor(pct) {
            return `rgb(${wearRgbStr(pct)})`;
        }

        /** Apply wear-gradient bg (0.3 opacity) + stroke to a tyre .cd-dmg-pair. */
        function setTyrePairColor(id, pct) {
            const el = document.getElementById(id);
            if (!el) return;
            const rgb = wearRgbStr(pct);
            el.querySelector('.cd-pair-bg').style.backgroundColor = `rgba(${rgb}, 0.3)`;
            el.querySelector('.cd-pair-stk').style.borderColor    = `rgb(${rgb})`;
        }

        // ── Show / hide helpers ────────────────────────────────────────────
        function showOverlay() {
            overlayContainer.classList.add('visible');
            titleSlideIn();
            if (cdConfig.autoDisplay) {
                clearTimeout(autoHideTimer);
                autoHideTimer = setTimeout(hideOverlay, 15000);
            }
        }

        function hideOverlay() {
            clearTimeout(autoHideTimer);
            autoHideTimer = null;
            overlayContainer.classList.remove('visible');
            titleSlideOut();
        }

        // ── Auto-show (Packet 10 damage threshold detection) ──────────────────
        /**
         * Compares current damage values against previous state.
         * Calls showOverlay() when a damage threshold is newly crossed.
         *
         * "on-car-damage" — triggers on bodywork entering yellow state:
         *   Wings / Diffuser / Rear Wing: ≥ 1 %
         *   Floor / Sidepods / Brakes:    ≥ 25 %
         *   Engine:                        ≥ 50 %
         *   Gearbox:                       ≥ 25 %
         *
         * "on-any-damage" — same as above, plus:
         *   Tyre wear: every 5 % increment of the highest-wear tyre.
         */
        function checkAutoShow(dmg, wFL, wFR, wRL, wRR, bdFL, bdFR, bdRL, bdRR) {
            if (!cdConfig.autoDisplay || cdConfig.autoMode === 'never') return;
            if (overlayContainer.classList.contains('visible')) return;

            const cur = {
                lfWing:   dmg.m_frontLeftWingDamage  ?? 0,
                rfWing:   dmg.m_frontRightWingDamage ?? 0,
                floor:    dmg.m_floorDamage          ?? 0,
                sidepod:  dmg.m_sidepodDamage        ?? 0,
                diffuser: dmg.m_diffuserDamage       ?? 0,
                rearWing: dmg.m_rearWingDamage       ?? 0,
                engine:   dmg.m_engineDamage         ?? 0,
                gearbox:  dmg.m_gearBoxDamage        ?? 0,
                brakeFL: bdFL, brakeFR: bdFR, brakeRL: bdRL, brakeRR: bdRR
            };

            // First packet — record baseline without triggering
            if (!dmgStateInitialized) {
                prevDmgState = { ...cur };
                if (cdConfig.autoMode === 'on-any-damage') {
                    prevDmgState.wearBucket = Math.floor(Math.max(wFL, wFR, wRL, wRR) / 5);
                }
                dmgStateInitialized = true;
                return;
            }

            let shouldShow = false;

            // Wings / Diffuser / Rear Wing: turn yellow at ≥ 1 %
            for (const key of ['lfWing', 'rfWing', 'diffuser', 'rearWing']) {
                if (prevDmgState[key] < 1 && cur[key] >= 1) { shouldShow = true; break; }
            }

            // Floor / Sidepods / Brakes: turn yellow at ≥ 25 %
            if (!shouldShow) {
                for (const key of ['floor', 'sidepod', 'brakeFL', 'brakeFR', 'brakeRL', 'brakeRR']) {
                    if (prevDmgState[key] < 25 && cur[key] >= 25) { shouldShow = true; break; }
                }
            }

            // Engine: ≥ 50 %  |  Gearbox: ≥ 25 %
            if (!shouldShow) {
                if (prevDmgState.engine  < 50 && cur.engine  >= 50) shouldShow = true;
                if (prevDmgState.gearbox < 25 && cur.gearbox >= 25) shouldShow = true;
            }

            // Tyre wear: every 5 % of the highest-wear tyre (on-any-damage only)
            if (!shouldShow && cdConfig.autoMode === 'on-any-damage') {
                const maxWear   = Math.max(wFL, wFR, wRL, wRR);
                const newBucket = Math.floor(maxWear / 5);
                if (newBucket > 0 && newBucket > (prevDmgState.wearBucket ?? 0)) {
                    shouldShow = true;
                }
                prevDmgState.wearBucket = newBucket;
            }

            Object.assign(prevDmgState, cur);

            if (shouldShow) {
                showOverlay();
            }
        }

        // ── Title slide animation ─────────────────────────────────────────────
        const titleEls = [
            document.getElementById('cd-title'),
            document.getElementById('cd-gradient-top')
        ];
        let titleTimer = null;

        function titleSlideIn() {
            titleEls.forEach(el => {
                if (!el) return;
                el.classList.remove('cd-title-exit');
                // Force reflow so re-adding the class restarts the animation
                void el.offsetWidth;
                el.classList.add('cd-title-enter');
            });
            clearTimeout(titleTimer);
            titleTimer = setTimeout(titleSlideOut, 8200);
        }

        function titleSlideOut() {
            clearTimeout(titleTimer);
            titleTimer = null;
            titleEls.forEach(el => {
                if (!el) return;
                el.classList.remove('cd-title-enter');
                void el.offsetWidth;
                el.classList.add('cd-title-exit');
            });
        }

        // ── Socket handlers ───────────────────────────────────────────────────
        socket.on('overlay_config', (config) => {
            if (config.overlays?.['car-damage']) {
                const cfg = config.overlays['car-damage'];
                const prevAutoDisplay = cdConfig.autoDisplay;
                cdConfig = { autoDisplay: !!cfg.autoDisplay, autoMode: cfg.autoMode || 'never', showRemainingLife: cfg.showRemainingLife !== false, useTeamColor: cfg.useTeamColor !== false };
                updateDriverNameColor();

                const newVisibility = !!cfg.visible;

                if (newVisibility !== previousVisibility) {
                    previousVisibility = newVisibility;
                    if (newVisibility) {
                        showOverlay();
                    } else {
                        hideOverlay();
                    }
                } else if (cdConfig.autoDisplay && !prevAutoDisplay && newVisibility) {
                    // autoDisplay was just switched on while overlay is already showing—start timer
                    clearTimeout(autoHideTimer);
                    autoHideTimer = setTimeout(hideOverlay, 15000);
                } else if (!cdConfig.autoDisplay && prevAutoDisplay) {
                    // autoDisplay switched off — cancel any pending hide timer
                    clearTimeout(autoHideTimer);
                    autoHideTimer = null;
                }
            }
        });

        socket.on('drivers_data', (drivers) => { driversData = drivers; });

        socket.on('f1_data', (data) => {
            try {
                const playerIdx = data?.m_header?.m_playerCarIndex;
                if (playerIdx !== undefined) playerIndex = playerIdx;

                const pid = data?.m_header?.m_packetId;

                // Packet 1 — Session (formula type)
                if (pid === 1 && typeof data.m_formula === 'number' && data.m_formula !== formulaType) {
                    formulaType = data.m_formula;
                    loadDriverData();
                }

                // Packet 4 — Participants (driver name + team colour)
                if (pid === 4) {
                    const participant = data.m_participants?.[playerIndex];
                    if (participant) {
                        const name = DriverUtils.getDriverLastName(participant, driversData, customDrivers, teamNames);
                        if (name) {
                            const el = document.getElementById('cd-driver-name');
                            el.textContent = name.toUpperCase();
                            textFit(el, { minFontSize: 12, maxFontSize: 25, multiLine: false, widthOnly: true, alignHoriz: true });
                        }

                        // Team ID
                        if (typeof participant.m_teamId === 'number' && participant.m_teamId !== currentTeamId) {
                            currentTeamId = participant.m_teamId;
                            updateDriverNameColor();
                        }

                        // Livery primary colour
                        const livery = participant.m_liveryColour?.[0];
                        if (livery && typeof livery.red === 'number') {
                            primaryColor = `rgb(${livery.red}, ${livery.green}, ${livery.blue})`;
                            updateDriverNameColor();
                        }
                    }
                }

                // Packet 7 — Car Status (compound + age)
                if (pid === 7) {
                    const cs = data.m_carStatusData?.[playerIndex];
                    if (cs) {
                        if (typeof cs.m_visualTyreCompound === 'number') {
                            const info = VISUAL_COMPOUND[cs.m_visualTyreCompound] || { code: '?', color: '#808080' };
                            const compEl = document.getElementById('cd-compound');
                            compEl.textContent  = info.code;
                            compEl.style.color  = info.color;
                        }
                        if (typeof cs.m_tyresAgeLaps === 'number') {
                            const age = cs.m_tyresAgeLaps;
                            document.getElementById('cd-tyre-age-num').textContent = age;
                            document.getElementById('cd-tyre-age-laps').textContent = age === 1 ? ' LAP' : ' LAPS';
                        }
                    }
                }

                // Packet 10 — Car Damage
                if (pid === 10) {
                    const dmg = data.m_carDamageData?.[playerIndex];
                    if (!dmg) return;

                    // Tyre array: RL=0, RR=1, FL=2, FR=3
                    const wRL = dmg.m_tyresWear?.[0] ?? 0;  const wRR = dmg.m_tyresWear?.[1] ?? 0;
                    const wFL = dmg.m_tyresWear?.[2] ?? 0;  const wFR = dmg.m_tyresWear?.[3] ?? 0;
                    const tdRL = dmg.m_tyresDamage?.[0] ?? 0; const bdRL = dmg.m_brakesDamage?.[0] ?? 0;
                    const tdRR = dmg.m_tyresDamage?.[1] ?? 0; const bdRR = dmg.m_brakesDamage?.[1] ?? 0;
                    const tdFL = dmg.m_tyresDamage?.[2] ?? 0; const bdFL = dmg.m_brakesDamage?.[2] ?? 0;
                    const tdFR = dmg.m_tyresDamage?.[3] ?? 0; const bdFR = dmg.m_brakesDamage?.[3] ?? 0;

                    // Per-corner wear % text
                    [['fl', wFL], ['fr', wFR], ['rl', wRL], ['rr', wRR]].forEach(([c, w]) => {
                        const el = document.getElementById(`cd-pct-${c}`);
                        if (el) {
                            el.textContent    = `${Math.round(cdConfig.showRemainingLife ? 100 - w : w)}%`;
                            el.style.color    = wearTextColor(w);
                            el.style.fontSize = w === 0 ? '20px' : '25px'; /* If no wear, lower the size, otherwise we can increase the text size a little */
                        }
                    });

                    // Tyre + brake damage colours
                    setTyrePairColor('cd-tyre-fl', wFL); applyPairColor('cd-brake-fl', heavyDmgRgb(bdFL));
                    setTyrePairColor('cd-tyre-fr', wFR); applyPairColor('cd-brake-fr', heavyDmgRgb(bdFR));
                    setTyrePairColor('cd-tyre-rl', wRL); applyPairColor('cd-brake-rl', heavyDmgRgb(bdRL));
                    setTyrePairColor('cd-tyre-rr', wRR); applyPairColor('cd-brake-rr', heavyDmgRgb(bdRR));

                    // Bodywork images
                    updatePartImage('cd-lf-wing',   'LfWing',   dmg.m_frontLeftWingDamage  ?? 0);
                    updatePartImage('cd-rf-wing',   'RfWing',   dmg.m_frontRightWingDamage ?? 0);
                    updatePartImage('cd-floor',     'Floor',    dmg.m_floorDamage          ?? 0, heavyPartVariant);
                    updatePartImage('cd-l-sidepod', 'Lsidepod', dmg.m_sidepodDamage        ?? 0, heavyPartVariant);
                    updatePartImage('cd-r-sidepod', 'Rsidepod', dmg.m_sidepodDamage        ?? 0, heavyPartVariant);
                    updatePartImage('cd-diffuser',  'Diffuser', dmg.m_diffuserDamage       ?? 0);

                    // Rear wing — also respects DRS fault state
                    rearWingDmg = dmg.m_rearWingDamage ?? 0;
                    if (typeof dmg.m_drsFault === 'number' && dmg.m_drsFault !== drsFault) {
                        drsFault = dmg.m_drsFault;
                    }
                    updateRearWing();

                    const engEl = document.getElementById('cd-engine');
                    if (engEl) engEl.src = `/images/car-damage/Engine${engineVariant(dmg.m_engineDamage ?? 0)}.png`;

                    applyPairColor('cd-gearbox', gearboxDmgRgb(dmg.m_gearBoxDamage ?? 0));

                    checkAutoShow(dmg, wFL, wFR, wRL, wRR, bdFL, bdFR, bdRL, bdRR);
                }

            } catch (e) {
                console.error('[CarDamage] Error:', e);
            }
        });

        loadDriverData().then(() => console.log('[CarDamage] Initialized'));
    </script>
</body>
</html>
