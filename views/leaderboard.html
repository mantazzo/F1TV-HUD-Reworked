        // ── Slot visibility ────────────────────────────────────────────────
        // Hide pre-allocated rows beyond the active car count for always-visible
        // containers. Conditionally-visible containers (inPit, finish, out,
        // pitStatus) are already display:none by default and driven by game data,
        // so they don't need slot-count clamping.
        function updateSlotVisibility() {
            const containers = [
                elPenalty, elFlLogo, elDrivers,
                elTimingInterval, elTimingLeader,
                elQualiGaps, elQualiTimes,
                elTyre,
            ];
            for (const container of containers) {
                Array.from(container.children).forEach((child, i) => {
                    child.style.display = i < numActiveCars ? '' : 'none';
                });
            }
        }

        // ── Packet handling ────────────────────────────────────────────────
        socket.on('drivers_data', (data) => {
            aiDrivers = data;
        });

        socket.on('f1_data', (data) => {
            if (!data?.m_header) return;
            const pid = data.m_header.m_packetId;

            // Packet ID 1 — Session
            if (pid === 1) {
                sessionType = data.m_sessionType    ?? 0;
                totalLaps   = data.m_totalLaps      ?? 0;
                sessionDuration = data.m_sessionDuration ?? sessionDuration;
                const timeLeft = data.m_sessionTimeLeft ?? 0;
                const newTrackId = data.m_trackId ?? -1;
                if (newTrackId !== -1 && newTrackId !== trackId) {
                    trackId = newTrackId;
                    updateScBanner();
                }

                // Sprint race detection: sessionType 15 with sessionType 16 also in weather forecast
                if (sessionType === 15) {
                    const numSamples = data.m_numWeatherForecastSamples ?? 0;
                    const forecasts  = data.m_weatherForecastSamples;
                    isSprintSession  = Array.isArray(forecasts)
                        && forecasts.slice(0, numSamples).some(s => (s.m_sessionType ?? 0) === 16);
                } else {
                    isSprintSession = false;
                }

                updateHeaderDisplay();
                updateKnockoutIndicators();

                // Time remaining banner — practice + standard qualifying only (types 1–8; not SQ/OSQ)
                if (sessionType >= 1 && sessionType <= 8) {
                    for (const t of TIME_TRIGGERS_S) {
                        if (t < sessionDuration && prevTimeLeft > t && timeLeft <= t) {
                            showTimeLapsBanner('minutes', Math.round(t / 60));
                            break;
                        }
                    }
                }
                // Timer hit zero — freeze timer display at 0:00 and show finished banner (all timed sessions)
                if (TIMED_TYPES.has(sessionType) && prevTimeLeft > 0 && timeLeft === 0) {
                    elFinishedImg.style.opacity = '0.5';
                    sessionEnded = true;
                }
                updateTimerText(timeLeft);
                prevTimeLeft = timeLeft;

                // Safety Car / VSC: m_safetyCarStatus 1 = SC, 2 = VSC, 3 = Formation Lap
                // Yellow flag: any marshal zone with m_zoneFlag === 3, only when no SC/VSC/RF active
                const scStatus = data.m_safetyCarStatus ?? 0;
                const wasFormationLap = formationLap;
                formationLap = scStatus === 3;
                if (formationLap !== wasFormationLap) {
                    updateFlagsBorder(); updateFlagsImg(); updateThickStrokeBg(); updateBorderRect();
                    updateMainPanels(); updateRaceLaps(); updateDataContainerLeft(); updateFormationBanner();
                    updateHeaderDisplay();
                    updateAllRowPositions(); updateBatteryLayout(); updatePenaltyLayout(); updateFlLogoLayout();
                    // Formation Lap start: auto-show MFD1 data without header (wide mode only); end: hide if no MFD page active
                    if (formationLap && paneMode !== 1 && paneMode !== 3) {
                        elMfd1Header.style.opacity = '0';
                        elMfd1.style.opacity       = '1';
                    } else if (!mfdActive) {
                        elMfd1.style.opacity = '0';
                    }
                    // Tyre column: hide during formation lap (overlay_config may not re-fire in time)
                    const flTyreHidden = showLastNames || formulaType === 2 || formulaType === 7 || formationLap || paneMode === 1;
                    elTyre.style.display = flTyreHidden ? 'none' : '';
                }
                if (scStatus === 1) {
                    setFlagsBanner('sc');
                } else if (scStatus === 2) {
                    setFlagsBanner('vsc');
                } else if (scStatus === 3) {
                    // Formation Lap: no banner, border just shifts via updateFlagsBorder above
                    if (flagsBannerMode !== 'rf') setFlagsBanner(null);
                } else if (flagsBannerMode !== 'rf') {
                    const yellowSectors = getYellowSectors(data);
                    if (yellowSectors)          setFlagsBanner('yellow', yellowSectors);
                    else if (hasGreenFlag(data)) setFlagsBanner('green');
                    else                         setFlagsBanner(null);
                }
                // SC/VSC gone: clear the ENDING banner if it was still showing
                if (scStatus === 0 && scEnding) {
                    scEnding = false;
                    updateScEndingBanner();
                }

                if (data.m_formula !== undefined && data.m_formula !== formulaType) {
                    formulaType = data.m_formula;
                    loadDriverData();
                    updateFlagsBorder();
                    updateMainPanels();
                    updateDataContainerLeft();
                    updateHeaderDisplay(); // re-evaluate F1 vs F2 timer visibility
                }
            }

            // Packet ID 2 — Lap Data
            if (pid === 2) {
                playerCarIdx = data.m_header.m_playerCarIndex ?? playerCarIdx;
                const lapData = data.m_lapData;
                if (!Array.isArray(lapData)) return;

                let anyFinished = false;

                // Update carIdx → position and delta arrays
                lapData.forEach((car, idx) => {
                    if (idx >= NUM_CARS) return;
                    carPositions[idx]   = car.m_carPosition ?? 0;
                    carDeltaFront[idx]  = (car.m_deltaToCarInFrontMinutesPart  ?? 0) * 60000 + (car.m_deltaToCarInFrontMSPart  ?? 0);
                    carDeltaLeader[idx] = (car.m_deltaToRaceLeaderMinutesPart  ?? 0) * 60000 + (car.m_deltaToRaceLeaderMSPart  ?? 0);
                    carLapNum[idx]      = car.m_currentLapNum ?? 0;
                    carLapDist[idx]     = car.m_lapDistance ?? 0;
                    carDriverStatus[idx] = car.m_driverStatus ?? -1;
                    carPitStatus[idx]    = car.m_pitStatus ?? 0;
                    carNumPitStops[idx]  = car.m_numPitStops ?? 0;

                    // MFD3 — laps completed (non-race) or tyre changes / pit stops (race)
                    const pos = car.m_carPosition ?? 0;
                    if (pos >= 1 && pos <= NUM_CARS) {
                        const isRace = RACE_TYPES.has(sessionType);
                        mfd3Rows[pos - 1].row.textContent = isRace
                            ? (car.m_numPitStops ?? 0)
                            : (car.m_currentLapNum - 1 ?? 0);
                        // MFD3 visibility: hide for DSQ/retired, non-race with no best lap, or in pits
                        const resultStatus = car.m_resultStatus ?? 0;
                        const isNotActive = resultStatus < 2 || resultStatus > 3; // any status that is not "Active" or "Finished"
                        const hasBestLap = carBestLapMs[idx] > 0;
                        const inPits = (car.m_pitStatus ?? 0) > 0 || (car.m_driverStatus ?? -1) === 0;
                        const showMfd3 = !isNotActive && (isRace || hasBestLap) && !inPits;
                        mfd3Rows[pos - 1].row.style.display = showMfd3 ? 'flex' : 'none';

                        // MFD4 — positions gained / lost vs grid start
                        const gridPos    = car.m_gridPosition ?? 0;
                        const currentPos = car.m_carPosition  ?? 0;
                        const m4Row = mfd4Rows[pos - 1];
                        if (gridPos > 0 && currentPos > 0) {
                            const diff = gridPos - currentPos; // positive = gained, negative = lost
                            m4Row.text.textContent = Math.abs(diff);
                            if (diff > 0) {
                                m4Row.arrow.className = 'lb-mfd4-arrow lb-mfd4-arrow--up';
                            } else if (diff < 0) {
                                m4Row.arrow.className = 'lb-mfd4-arrow lb-mfd4-arrow--down';
                            } else {
                                m4Row.arrow.className = 'lb-mfd4-arrow lb-mfd4-arrow--none';
                            }
                        }

                        // In-Pit Logo — show in non-race sessions when car is pitting OR driver is reported In Garage and hasn't finished
                        // It seems sometimes game reports m_pitStatus as 0 and m_driverStatus as 0 while in pits (should be >0 and 0 instead of 0 and 0) - likely a game bug, so we do a workaround
                        const inPit = !isRace &&
                            ((car.m_pitStatus ?? 0) > 0 ||
                            (car.m_driverStatus ?? -1) === 0) &&
                            (car.m_resultStatus ?? 0) !== 3;  // only show for non-finished cars
                        inPitRows[pos - 1].row.style.display = inPit ? 'block' : 'none';

                        // Penalty row — race-only, shown when toggle on and any penalty exists
                        const unservedSG = car.m_numUnservedStopGoPens ?? 0;
                        const unservedDT = car.m_numUnservedDriveThroughPens ?? 0;
                        const penSecs    = car.m_penalties ?? 0;
                        const hasPenalty = unservedSG > 0 || unservedDT > 0 || penSecs > 0;
                        const penRow     = penaltyRows[pos - 1];
                        if (showPenalties && isRace && hasPenalty) {
                            let penText = '';
                            // Priority 1: unserved drive-through penalties
                            if (unservedDT > 0) {
                                penText = 'DT';
                            } else if (unservedSG > 0 && penSecs > 0) {
                                // Priority 2: calculate and display combined time of unserved stop/go time penalties (10s each) and any other earned time penalties
                                let combinedTime = unservedSG * 10 + penSecs;
                                penText = `${combinedTime}s`;
                            } else if (unservedSG > 0) {
                                // Priority 3: display any unserved stop/go time penalties (10s each)
                                penText = `${unservedSG * 10}s`;
                            } else if (penSecs > 0) {
                                // Priority 4: display time penalty if there are no other type of penalties
                                penText = `${penSecs}s`;
                            }
                            penRow.value.textContent = penText;
                            penRow.value.parentElement.style.display = 'block';
                        } else {
                            // If driver has no penalty, just don't display the block for the driver
                            penRow.value.parentElement.style.display = 'none';
                        }

                        // Pit Status row — race-only, shows IN PIT while in pitlane, PIT EXIT while
                        // merging back onto track (delta still zero), hidden once timing resumes.
                        // P1 skips PIT EXIT entirely since delta-to-leader is always zero for the leader.
                        // Also catches pit entry: driverStatus === 2 (in lap) with deltas already zeroed.
                        const racePit = isRace &&
                            ((car.m_pitStatus ?? 0) > 0 ||
                            (car.m_driverStatus ?? -1) === 0 ||
                            ((car.m_driverStatus ?? -1) === 2 &&
                             carDeltaFront[idx] === 0 &&
                             carDeltaLeader[idx] === 0)) &&
                            (car.m_resultStatus ?? 0) < 3;  // only show for active cars (not finished/retired)
                        const racePitExit = isRace && !racePit &&
                            (car.m_driverStatus ?? -1) === 3 &&
                            (car.m_numPitStops ?? 0) > 0 &&
                            (car.m_pitStatus ?? 0) === 0 &&
                            pos > 1 &&
                            carDeltaFront[idx] === 0 &&
                            carDeltaLeader[idx] === 0 &&
                            (car.m_resultStatus ?? 0) < 3 &&
                            !isRaceRestart;  // only show for active cars (not finished/retired) and not if there is a Race Restart
                        const psRow = pitStatusRows[pos - 1];
                        if (racePit) {
                            psRow.text.textContent  = 'IN PIT';
                            psRow.text.style.color  = carPrimaryColors[idx] ?? 'rgb(255, 255, 255)';
                            psRow.row.style.opacity = '1';
                        } else if (racePitExit) {
                            psRow.text.textContent  = 'PIT EXIT';
                            psRow.text.style.color  = carPrimaryColors[idx] ?? 'rgb(255, 255, 255)';
                            psRow.row.style.opacity = '1';
                        } else {
                            psRow.row.style.opacity = '0';
                        }

                        // Finish Logo — show when driver has finished, is not in pit lane, and is not in garage
                        const finished = (car.m_resultStatus ?? 0) === 3; // Will likely need to shift this to carResultStatus later to unify the structure
                        finishRows[pos - 1].row.style.opacity = finished ? '1' : '0';
                        if (finished) anyFinished = true;

                        // Store result status for battery visibility guard
                        carResultStatus[idx] = car.m_resultStatus ?? 0;

                        // OUT text — show for DNF (4), DSQ (5), or retired (7) drivers; hidden when MFD4 is active
                        const isOut = carResultStatus[idx] === 4 || carResultStatus[idx] === 5 || carResultStatus[idx] === 7;
                        outRows[pos - 1].row.style.display = (isOut && !isMfd4) ? 'block' : 'none';
                    }
                });

                // Compute numActiveCars from highest assigned position (includes retired/finished cars)
                let maxPos = 0;
                for (let i = 0; i < NUM_CARS; i++) {
                    if (carPositions[i] > maxPos) maxPos = carPositions[i];
                }
                numActiveCars = maxPos; // NOTE: Seems to work for now, however, multiplayer check will be required later.
                updateSlotVisibility();

                updateBatteryLayout();
                updatePenaltyLayout();
                updateFlLogoLayout();
                // Chequered flag banner:
                // Races: show when the car in P1 has finished
                // Non-race: show when any car has finished
                // NOTE: "CHQF" event was not being triggered properly, so we rely on the 'finished' status
                const raceFinished = RACE_TYPES.has(sessionType) && lapData.some(car => (car.m_carPosition ?? 0) === 1 && (car.m_resultStatus ?? 0) === 3);
                const showFinished = raceFinished || (!RACE_TYPES.has(sessionType) && anyFinished);
                elFinishedImg.style.opacity = showFinished ? '0.5' : '';
                if (showFinished && !sessionEnded) {
                    sessionEnded = true;
                    updateTimerText(0);
                }

                // Apply timing deltas, position numbers, and driver identity to display rows.
                // Driver identity (abbrev/lastName/logo) is re-applied here on every pid 2 packet
                // so that position changes are reflected immediately without waiting for the next pid 4.
                for (let carIdx = 0; carIdx < NUM_CARS; carIdx++) {
                    const pos = carPositions[carIdx];
                    if (pos < 1 || pos > NUM_CARS) continue;
                    const dRow = driverRows[pos - 1];
                    const tRow = timingRows[pos - 1];

                    // Position change arrow detection
                    const prevPos = carPrevPositions[carIdx];
                    if (prevPos > 0 && prevPos !== pos) {
                        const posIdx = pos - 1;
                        if (arrowTimers[posIdx] !== null) { clearTimeout(arrowTimers[posIdx]); arrowTimers[posIdx] = null; }
                        if (pos < prevPos) {
                            dRow.arrowDown.style.opacity = '0';
                            dRow.arrowUp.style.opacity   = '1';
                            arrowTimers[posIdx] = setTimeout(() => { dRow.arrowUp.style.opacity = '0'; arrowTimers[posIdx] = null; }, 2200);
                        } else {
                            dRow.arrowUp.style.opacity   = '0';
                            dRow.arrowDown.style.opacity = '1';
                            arrowTimers[posIdx] = setTimeout(() => { dRow.arrowDown.style.opacity = '0'; arrowTimers[posIdx] = null; }, 2200);
                        }
                    }
                    carPrevPositions[carIdx] = pos;

                    // Qualifying dash: show '–' instead of position number when no valid lap time set
                    const isQuali = QUALI_TYPES.has(sessionType) || SQ_TYPES.has(sessionType);
                    dRow.position.textContent = (isQuali && carBestLapMs[carIdx] === 0) ? '–' : pos;

                    // Sync name/logo from stored arrays (written by pid 4)
                    const abbrev      = carAbbrevs[carIdx];
                    const lastNameStr = carLastNames[carIdx];
                    const logoUrl     = carTeamLogos[carIdx];
                    const raceNum     = carRaceNumbers[carIdx];
                    dRow.abbrev.textContent       = abbrev;
                    dRow.lastNamePI.textContent   = lastNameStr.toUpperCase();
                    dRow.lastNamePI.className     = lastNameStr.length > 9
                        ? 'lb-driver-lastname-pi lb-driver-lastname-pi--long'
                        : 'lb-driver-lastname-pi';
                    dRow.lastName.textContent     = lastNameStr;
                    dRow.lastName.className       = lastNameStr.length > 9
                        ? 'lb-driver-lastname lb-driver-lastname--long'
                        : 'lb-driver-lastname';
                    const rsA = carResultStatus[carIdx];
                    const dimA = rsA === 5 || rsA === 7;
                    const showLNA = showLastNames && paneMode !== 1;
                    dRow.lastName.style.opacity = showLNA ? (dimA ? '0.65' : '1') : '0';
                    dRow.abbrev.style.opacity   = showLNA ? '0' : '1';
                    dRow.driverNumber.textContent  = raceNum > 0 ? raceNum : '';
                    dRow.driverNumber.style.color   = carPrimaryColors[carIdx];
                    if (showDriverNumbers && raceNum > 0) {
                        const imgUrl = carNumImgUrl[carIdx];
                        if (imgUrl) {
                            // Image confirmed available (SVG or PNG) — show image, hide text
                            dRow.numberImg.src              = imgUrl;
                            dRow.numberImg.style.display    = 'block';
                            dRow.driverNumber.style.display = 'none';
                            dRow.driverNumber.style.opacity = '0';
                        } else {
                            // No image (or still checking) — show colored text
                            dRow.numberImg.style.display    = 'none';
                            dRow.driverNumber.style.display = 'flex';
                            dRow.driverNumber.style.opacity = '1';
                        }
                        dRow.teamLogoNormal.style.display = 'none';
                    } else {
                        dRow.numberImg.style.display      = 'none';
                        dRow.driverNumber.style.display   = 'none';
                        dRow.driverNumber.style.opacity   = '0';
                        if (logoUrl) {
                            dRow.teamLogoNormal.src           = logoUrl;
                            dRow.teamLogoNormal.style.display = 'block';
                        } else {
                            dRow.teamLogoNormal.style.display = 'none';
                        }
                    }

                    // Fastest lap display: show lap time for 6 seconds when driver sets new fastest lap
                    const showFastestLap = fastestLapDisplayMs > 0 && pos === fastestLapDisplayPos;

                    // Helper: compute lapped text using hybrid lapNum + lapDistance approach
                    function getLappedText(deltaMs, refLapNum, refLapDist) {
                        if (deltaMs !== 0) return formatDeltaMs(deltaMs);
                        const carLap = carLapNum[carIdx] ?? 0;
                        let lapsDown = refLapNum - carLap;
                        if (refLapDist < carLapDist[carIdx]) lapsDown -= 1;
                        if (lapsDown > 0) return `+${lapsDown} LAP${lapsDown > 1 ? 'S' : ''}`;
                        return formatDeltaMs(deltaMs);
                    }

                    // Find car indices for leader and car in front (for Interval reference)
                    const leaderCarIdx = carPositions.indexOf(1);
                    const frontCarIdx  = carPositions.indexOf(pos - 1);
                    const leaderLapNum = leaderCarIdx >= 0 ? (carLapNum[leaderCarIdx] ?? 0) : 0;
                    const leaderLapDist = leaderCarIdx >= 0 ? (carLapDist[leaderCarIdx] ?? 0) : 0;
                    const frontLapNum  = frontCarIdx >= 0 ? (carLapNum[frontCarIdx] ?? 0) : 0;
                    const frontLapDist = frontCarIdx >= 0 ? (carLapDist[frontCarIdx] ?? 0) : 0;

                    tRow.iText.textContent = showFastestLap ? formatLapTimeMs(fastestLapDisplayMs)
                        : (pos === 1 ? 'Interval' : getLappedText(carDeltaFront[carIdx], frontLapNum, frontLapDist));
                    tRow.lText.textContent = showFastestLap ? formatLapTimeMs(fastestLapDisplayMs)
                        : (pos === 1 ? 'Leader'   : getLappedText(carDeltaLeader[carIdx], leaderLapNum, leaderLapDist));
                }

                // Track race leader's current lap for header
                if (RACE_TYPES.has(sessionType)) {
                    for (const car of lapData) {
                        if (car.m_carPosition === 1) {
                            if (car.m_currentLapNum !== currentLap) {
                                currentLap = car.m_currentLapNum;
                                updateHeaderDisplay();
                                // Time/Laps remaining banner — lap triggers
                                if (totalLaps > 0 && currentLap >= 2) {
                                    const lapsToGo = totalLaps - currentLap + 1;
                                    if (prevLapsRemaining !== Infinity) {
                                        if (lapsToGo === 1) {
                                            if (prevLapsRemaining > 1) showFinalLapBanner();
                                        } else {
                                            for (const t of LAP_TRIGGERS) {
                                                if (prevLapsRemaining > t && lapsToGo <= t) {
                                                    showTimeLapsBanner('laps', t);
                                                    break;
                                                }
                                            }
                                        }
                                    }
                                    prevLapsRemaining = lapsToGo;
                                }
                            }
                            break;
                        }
                    }
                }
                // Update quali timing for non-race sessions (needs driver/pit status from pid 2)
                if (!RACE_TYPES.has(sessionType)) {
                    updateQualiTimingDisplay();
                }

                applyIndicators();
                updateKnockoutIndicators();

                // Hide timing and tyre for any rows currently showing pit status or OUT text.
                // Must run after applyIndicators() since that clears all timing rows to ''.
                for (let p = 0; p < NUM_CARS; p++) {
                    if (pitStatusRows[p].row.style.opacity === '1') {
                        timingRows[p].iText.parentElement.style.display      = 'none';
                        timingRows[p].lText.parentElement.style.display      = 'none';
                        qualiTimingRows[p].gText.parentElement.style.display = 'none';
                        qualiTimingRows[p].tText.parentElement.style.display = 'none';
                        tyreRows[p].text.parentElement.style.display         = 'none';
                    }
                    hideOutDriverColumns();
                }

                // Re-hide tyre rows for any car currently in the pits. applyIndicators() unconditionally
                // resets all tyre rows to display:'', so in non-race sessions (where pitStatusRows are
                // never set to opacity '1') the tyre would otherwise flicker visible on every Packet 2.
                for (let ci = 0; ci < NUM_CARS; ci++) {
                    const pos = carPositions[ci];
                    if (pos < 1 || pos > NUM_CARS) continue;
                    if ((carPitStatus[ci] ?? 0) > 0 || (carDriverStatus[ci] ?? -1) === 0) {
                        tyreRows[pos - 1].text.parentElement.style.display = 'none';
                    }
                }
            }

            // Packet ID 3 — Event
            if (pid === 3) {
                if (data.m_eventStringCode === 'SSTA') {
                    resetSessionData();
                }
                // SCAR: safetyCarType 1 = SC, 2 = VSC; eventType 0 = deployed, 1 = returning, 3 = resume race
                if (data.m_eventStringCode === 'SCAR') {
                    const scType  = data.m_eventDetails?.safetyCarType ?? -1;
                    const evtType = data.m_eventDetails?.eventType     ?? -1;
                    if (evtType === 3) {
                        setFlagsBanner(null);  // Resume Race clears any flag banner (incl. red flag)
                        scEnding = false;
                        updateScEndingBanner();
                    } else if (scType === 1) {
                        setFlagsBanner(evtType === 0 ? 'sc' : null);
                        if (evtType === 1 && isRace) { scEnding = true; updateScEndingBanner(); }
                    } else if (scType === 2) {
                        setFlagsBanner(evtType === 0 ? 'vsc' : null);
                        if (evtType === 1 && isRace) { scEnding = true; updateScEndingBanner(); }
                    }
                }
                // RDFL: red flag deployed — cleared by SCAR eventType 3 (Resume Race) or SSTA
                if (data.m_eventStringCode === 'RDFL') {
                    isRaceRestart = true;  // Setup for Race Restart timing
                    setFlagsBanner('rf');
                }
                // LGOT: lights out - official declaration of race start
                // Used mainly for tracking Race Restarts
                if (data.m_eventStringCode === 'LGOT') {
                    if (isRaceRestart) {
                        if (raceRestartTimer) clearTimeout(raceRestartTimer);
                        raceRestartTimer = setTimeout(() => {
                            isRaceRestart    = false;
                            raceRestartTimer = null;
                        }, 6000);
                    }
                }
                // FTLP: fastest lap achieved - save vehicleIdx for faster identification
                // This is the game's official fastest-lap announcement; takes priority over pid 11 recomputation.
                if (data.m_eventStringCode === 'FTLP') {
                    fastestLapCarIdx = data.m_eventDetails?.vehicleIdx ?? -1;
                    updateBatteryLayout();
                    updatePenaltyLayout();
                    updateFlLogoLayout();
                    if (!isRace) triggerFlAnim();
                    if (isRace && currentLap >= 2) triggerFlRaceAnim();
                }
                // CHQF is NOT thrown for some reason... Commented out until I can discover why
                // If fixed, this would be an easy way to discover when the session ending is triggered, for now, I'll have to rely on driver result status
                /* if (data.m_eventStringCode === 'CHQF') {
                    elFinishedImg.style.opacity = '1';
                } */
            }

            // Packet ID 4 — Participants
            if (pid === 4) {
                const activeFromPacket = data.m_numActiveCars ?? 0;
                if (activeFromPacket > numActiveCars) numActiveCars = activeFromPacket;
                extendedGrid = numActiveCars > 20;
                updateFlagsImg();
                updateThickStrokeBg();
                updateBorderRect();
                updateMainPanels();
                updateDataContainerLeft();
                elThickStrokeBg.style.backgroundImage = extendedGrid
                    ? "url('/images/leaderboard/BG_22.png')"
                    : "url('/images/leaderboard/BG.png')";

                const participants = data.m_participants;
                if (Array.isArray(participants)) {
                    participants.forEach((participant, carIdx) => {
                        if (carIdx >= NUM_CARS) return;

                        // Abbreviation
                        const abbrev = DriverUtils.getDriverAbbreviation(participant, aiDrivers, customDrivers, teamNames);
                        carAbbrevs[carIdx] = abbrev;

                        // Last name — resolved via custom/AI driver data, falling back to m_name
                        const lastNameStr = DriverUtils.getDriverLastName(participant, aiDrivers, customDrivers, teamNames);
                        carLastNames[carIdx] = lastNameStr;

                        // Race number + image preload (SVG preferred, PNG fallback)
                        const raceNum = participant.m_raceNumber ?? 0;
                        if (raceNum > 0 && carRaceNumbers[carIdx] !== raceNum) {
                            carNumImgUrl[carIdx] = null;
                            const svgSrc = `/images/driver-numbers/${raceNum}.svg`;
                            const pngSrc = `/images/driver-numbers/${raceNum}.png`;
                            const preload = new Image();
                            preload.onload  = () => { carNumImgUrl[carIdx] = svgSrc; };
                            preload.onerror = () => {
                                const pngPreload = new Image();
                                pngPreload.onload  = () => { carNumImgUrl[carIdx] = pngSrc; };
                                pngPreload.onerror = () => { carNumImgUrl[carIdx] = false; };
                                pngPreload.src = pngSrc;
                            };
                            preload.src = svgSrc;
                        }
                        carRaceNumbers[carIdx] = raceNum;

                        // Team primary color: OverridePrimaryColor → livery[0] → fallback white
                        const teamId   = participant.m_teamId;
                        const teamData = teamNames[teamId];
                        carTeamIds[carIdx] = teamId;
                        if (teamData?.OverridePrimaryColor) {
                            carPrimaryColors[carIdx] = teamData.OverridePrimaryColor;
                        } else {
                            const livery = participant.m_liveryColour?.[0];
                            carPrimaryColors[carIdx] = (livery && typeof livery.red === 'number')
                                ? `rgb(${livery.red}, ${livery.green}, ${livery.blue})`
                                : 'rgb(255, 255, 255)';
                        }

                        // Team logo
                        const logoFile = teamData?.Logo ?? null;
                        const logoUrl  = logoFile ? `/images/team-logos/${logoFile}` : '';
                        carTeamLogos[carIdx] = logoUrl;

                        const pos = carPositions[carIdx];
                        if (pos >= 1 && pos <= NUM_CARS) {
                            const row = driverRows[pos - 1];
                            row.abbrev.textContent        = abbrev;
                            row.lastNamePI.textContent    = lastNameStr.toUpperCase();
                            row.lastNamePI.className      = lastNameStr.length > 9
                                ? 'lb-driver-lastname-pi lb-driver-lastname-pi--long'
                                : 'lb-driver-lastname-pi';
                            row.lastName.textContent  = lastNameStr;
                            row.lastName.className    = lastNameStr.length > 9
                                ? 'lb-driver-lastname lb-driver-lastname--long'
                                : 'lb-driver-lastname';
                            const rsB = carResultStatus[carIdx];
                            const dimB = rsB > 3; // Any DNF/DSQ/NotClassified/Retired status
                            const showLNB = showLastNames && paneMode !== 1;
                            row.lastName.style.opacity = showLNB ? (dimB ? '0.65' : '1') : '0';
                            row.abbrev.style.opacity   = showLNB ? '0' : '1';
                            if (logoUrl) {
                                row.teamLogoNormal.src          = logoUrl;
                                row.teamLogoNormal.style.display = 'block';
                            } else {
                                row.teamLogoNormal.style.display = 'none';
                            }
                        }
                    });
                }
                updateKnockoutIndicators();
            }

            // Packet ID 6 — Car Telemetry: DRS active per car
            if (pid === 6) {
                const telData = data.m_carTelemetryData;
                if (!Array.isArray(telData)) return;
                telData.forEach((car, carIdx) => {
                    const pos = carPositions[carIdx];
                    if (pos < 1 || pos > NUM_CARS) return;
                    drsRows[pos - 1].row.style.display = (showDrsIndicators && car.m_drs === 1) ? 'block' : 'none';
                });
            }

            // Packet ID 7 — Car Status
            if (pid === 7) {
                const statusData = data.m_carStatusData;
                if (!Array.isArray(statusData)) return;
                let hasERS = false;
                statusData.forEach((car, carIdx) => {
                    const pos = carPositions[carIdx];
                    if (pos < 1 || pos > NUM_CARS) return;

                    // ERS battery
                    const ersJ   = car.m_ersStoreEnergy ?? 0;
                    const ersPct = Math.min(100, Math.max(0, (ersJ / 4000000) * 100));
                    const bRow      = batteryRows[pos - 1];
                    const overtake   = car.m_ersDeployMode === 3;
                    const lowBattery = ersPct <= 20;
                    bRow.gaugeFill.style.width       = `${ersPct}%`;
                    bRow.gaugeFill.style.backgroundColor = overtake ? 'lime' : lowBattery ? 'red' : 'rgb(255, 140, 0)';
                    bRow.img.style.backgroundImage   = overtake
                        ? "url('/images/leaderboard/Battery_Green.png')"
                        : lowBattery
                        ? "url('/images/leaderboard/Battery_Red.png')"
                        : "url('/images/leaderboard/Battery_Yellow.png')";
                    bRow.text.textContent            = `${Math.round(ersPct)}%`;
                    if (ersJ > 0) hasERS = true;
                    // Hide battery for DSQ (4), Retired (6), or Finished (3) drivers
                    const rs = carResultStatus[carIdx] ?? 0;
                    const hideBattery = rs === 3 || rs === 4 || rs === 6;
                    bRow.row.style.display = (showBattery && ersJ > 0 && !hideBattery) ? 'block' : 'none';

                    // Tyre compound
                    const compoundId = car.m_visualTyreCompound;
                    const compound   = TYRE_COMPOUND[compoundId];
                    const tRow       = tyreRows[pos - 1];
                    if (compound) {
                        tRow.text.textContent   = compound.letter;
                        tRow.text.style.color   = compound.color;

                        // MFD1 compound name
                        const m1Row = mfd1Rows[pos - 1];
                        if (compound) {
                            m1Row.row.textContent = compound.displayText;
                            m1Row.row.style.color = compound.color;
                        }
                        // MFD1 visibility: hide for DSQ/retired, non-race with no best lap, or in pits
                        const resultStatus = carResultStatus[carIdx] ?? 0;
                        const isNotActive = resultStatus < 2 || resultStatus > 3; // any status that is not "Active" or "Finished"
                        const hasBestLap = carBestLapMs[carIdx] > 0;
                        const inPits = (carPitStatus[carIdx] ?? 0) > 0 || (carDriverStatus[carIdx] ?? -1) === 0;
                        const showMfd1 = !isNotActive && (isRace || hasBestLap) && !inPits;
                        m1Row.row.style.display = showMfd1 ? 'flex' : 'none';
                    }

                    // MFD2 tyre age
                    mfd2Rows[pos - 1].row.textContent = car.m_tyresAgeLaps ?? 0;
                    // MFD2 visibility: hide for DSQ/retired, non-race with no best lap, or in pits
                    const resultStatus = carResultStatus[carIdx] ?? 0;
                    const isNotActive = resultStatus < 2 || resultStatus > 3; // any status that is not "Active" or "Finished"
                    const hasBestLap = carBestLapMs[carIdx] > 0;
                    const inPits = (carPitStatus[carIdx] ?? 0) > 0 || (carDriverStatus[carIdx] ?? -1) === 0;
                    const showMfd2 = !isNotActive && (isRace || hasBestLap) && !inPits;
                    mfd2Rows[pos - 1].row.style.display = showMfd2 ? 'flex' : 'none';

                    // Tyre row visibility: hide for inactive/DSQ/retired or in pits;
                    // in race, also hide on pit exit (driverStatus=out lap, deltas still zero) until timing resumes
                    const tyrePitExit = isRace &&
                        carDriverStatus[carIdx] === 3 &&
                        carNumPitStops[carIdx] > 0 &&
                        carPitStatus[carIdx] === 0 &&
                        pos > 1 &&
                        carDeltaFront[carIdx] === 0 &&
                        carDeltaLeader[carIdx] === 0 &&
                        !isRaceRestart;
                    const playerTeamId = playerCarIdx >= 0 ? (carTeamIds[playerCarIdx] ?? -2) : -2;
                    const isTeammateRow = showTeammateIndicator && playerCarIdx >= 0
                        && carIdx !== playerCarIdx
                        && playerTeamId >= 0
                        && carTeamIds[carIdx] === playerTeamId;
                    const isPlayerRow = showPrimaryPI && carIdx === playerCarIdx;
                    if (isPlayerRow || isTeammateRow) {
                        tRow.text.parentElement.style.display = 'none';
                    } else {
                        tRow.text.parentElement.style.display = (!isNotActive && !inPits && !tyrePitExit) ? '' : 'none';
                    }
                });
                updateBatteryLayout();
                updatePenaltyLayout();
                updateFlLogoLayout();
            }

            // Packet ID 11 — Session History: best lap per car
            if (pid === 11) {
                const carIdx = data.m_carIdx;
                if (carIdx !== undefined && carIdx < NUM_CARS) {
                    const bestLapNum = data.m_bestLapTimeLapNum ?? 0;
                    if (bestLapNum > 0) {
                        const laps  = data.m_lapHistoryData;
                        const lapMs = Array.isArray(laps) ? (laps[bestLapNum - 1]?.m_lapTimeInMS ?? 0) : 0;
                        if (lapMs > 0) {
                            const prevBest = carBestLapMs[carIdx];
                            carBestLapMs[carIdx] = lapMs;
                            // Recompute fastest-lap driver across all cars
                            let bestMs = Infinity;
                            fastestLapCarIdx = -1;
                            for (let i = 0; i < NUM_CARS; i++) {
                                if (carBestLapMs[i] > 0 && carBestLapMs[i] < bestMs) {
                                    bestMs = carBestLapMs[i];
                                    fastestLapCarIdx = i;
                                }
                            }
                            // Detect new fastest lap and trigger 6-second display
                            if (bestMs < prevFastestLapMs && fastestLapCarIdx >= 0) {
                                const pos = carPositions[fastestLapCarIdx];
                                if (pos >= 1 && currentLap > 2) triggerFastestLapDisplay(bestMs, pos);
                                prevFastestLapMs = bestMs;
                            }
                            // Detect personal best improvement (for quali gaps display)
                            // Only trigger if this car improved their own best AND is not the session fastest
                            if (prevBest > 0 && lapMs < prevBest && carIdx !== fastestLapCarIdx) {
                                const pos = carPositions[carIdx];
                                if (pos >= 1) triggerPersonalBestDisplay(lapMs, pos);
                            }
                            prevPersonalBestMs[carIdx] = lapMs;
                            updateQualiTimingDisplay();
                            updateKnockoutIndicators();
                            updateBatteryLayout();
                            updatePenaltyLayout();
                            updateFlLogoLayout();
                        }
                    }
                }
            }
        });

        // ── Overlay visibility ─────────────────────────────────────────────
        socket.on('overlay_config', (config) => {
            const cfg = config?.overlays?.leaderboard;
            if (!cfg) return;
            elOverlay.classList.toggle('visible', !!cfg.visible);

            // MFD page visibility — show the active page's header+data, hide all others
            const page = cfg.mfdPage || 'off';
            mfdActive = page !== 'off';
            isMfd4    = page === 'mfd4';
            paneMode = cfg.pane ?? 0;
            elContainer.classList.toggle('pane-4', paneMode === 4);
            updateHeaderDisplay();
            updateTimeLapsBanner();
            updateFlagsBorder();
            updateMainPanels();
            updateRaceLaps();
            updateScBanner();
            updateScEndingBanner();
            updateFormationBanner();
            updateDataContainerLeft();
            const mfdPages = {
                mfd1: [elMfd1Header, elMfd1],
                mfd2: [elMfd2Header, elMfd2],
                mfd3: [elMfd3Header, elMfd3],
                mfd4: [elMfd4Header, elMfd4],
            };
            for (const [key, [header, data]] of Object.entries(mfdPages)) {
                const show = key === page && !formationLap;
                header.style.opacity = show ? '1' : '0';
                data.style.opacity   = show ? '1' : '0';
            }
            // Formation Lap: show MFD1 data (no header) in wide modes; hidden in narrow pane (1/3)
            if (formationLap && paneMode !== 1 && paneMode !== 3) {
                elMfd1Header.style.opacity = '0';
                elMfd1.style.opacity       = '1';
            }

            // OUT rows: hide when MFD4 is active (position-change column occupies the same area)
            outRows.forEach(({ row }, p) => {
                const carIdx = carPositions.indexOf(p + 1);
                if (carIdx < 0) return;
                const rs = carResultStatus[carIdx] ?? 0;
                const isOut = rs === 4 || rs === 5 || rs === 7;
                row.style.display = (isOut && !isMfd4) ? 'block' : 'none';
            });

            // Reposition all rows: MFD stride when active, banner shift when flag is set, else normal
            updateAllRowPositions();
            updateBatteryLayout();
            updatePenaltyLayout();
            updateFlLogoLayout();
            // Banner is hidden while MFD is active; re-show it if a flag mode was already set
            elVscBanner.style.display = (flagsBannerMode && !mfdActive) ? 'block' : 'none';

            // Last Names toggle — swap abbreviation vs last name per driver row
            showLastNames = !!cfg.showLastNames;
            driverRows.forEach((row, p) => {
                const carIdx = carPositions.indexOf(p + 1);
                const rs = carIdx >= 0 ? carResultStatus[carIdx] : 0;
                const dim = rs > 3; // Any DNF/DSQ/NotClassified/Retired status
                const showLN = showLastNames && paneMode !== 1;
                row.abbrev.style.opacity   = showLN ? '0' : '1';
                row.lastName.style.opacity = showLN ? (dim ? '0.65' : '1') : '0';
            });

            // Driver Numbers toggle — swap team logo vs race number (SVG preferred, text fallback)
            showDriverNumbers = !!cfg.showDriverNumbers;
            for (let carIdx = 0; carIdx < NUM_CARS; carIdx++) {
                const pos = carPositions[carIdx];
                if (pos < 1 || pos > NUM_CARS) continue;
                const row    = driverRows[pos - 1];
                const rn     = carRaceNumbers[carIdx];
                const imgUrl = carNumImgUrl[carIdx];
                if (showDriverNumbers && rn > 0) {
                    row.teamLogoNormal.style.display = 'none';
                    if (imgUrl) {
                        row.numberImg.src              = imgUrl;
                        row.numberImg.style.display    = 'block';
                        row.driverNumber.style.display = 'none';
                        row.driverNumber.style.opacity = '0';
                    } else {
                        row.numberImg.style.display    = 'none';
                        row.driverNumber.style.display = 'flex';
                        row.driverNumber.style.opacity = '1';
                    }
                } else {
                    row.numberImg.style.display      = 'none';
                    row.driverNumber.style.display   = 'none';
                    row.driverNumber.style.opacity   = '0';
                    const logoUrl = carTeamLogos[carIdx];
                    row.teamLogoNormal.style.display = logoUrl ? 'block' : 'none';
                }
            }

            // Race timing sub-layer: Interval gaps (default) vs Leader gaps
            showLeaderGaps = !!cfg.showLeaderGaps;
            elTimingInterval.style.display = showLeaderGaps ? 'none'  : 'block';
            elTimingLeader.style.display   = showLeaderGaps ? 'block' : 'none';

            // Non-race timing sub-layer: Gaps to leader (default) vs Lap times
            showQualiTimes = !!cfg.showQualiTimes;
            elQualiGaps.style.opacity  = showQualiTimes ? '0' : '1';
            elQualiTimes.style.opacity = showQualiTimes ? '1' : '0';

            // Player / Teammate indicators
            showPrimaryPI         = !!cfg.showPrimaryPI;
            showSecondaryPI       = !!cfg.showSecondaryPI;
            showTeammateIndicator = !!cfg.showTeammateIndicator;
            applyIndicators();
            hideOutDriverColumns();

            // DRS indicators — hide all when toggle is off
            showDrsIndicators = !!cfg.showDrsIndicators;
            if (!showDrsIndicators) {
                drsRows.forEach(({ row }) => { row.style.display = 'none'; });
            }

            // Hide timing columns while any MFD page or Last Names mode is active;
            // when both are off, show the timing relevant to the current session type
            elTiming.style.display      = (!mfdActive && !showLastNames && !formationLap && isRace && paneMode !== 1 && paneMode !== 3)   ? '' : 'none';
            elQualiTiming.style.display = (!mfdActive && !showLastNames && !formationLap && !isRace && paneMode !== 1 && paneMode !== 3)  ? '' : 'none';
            const isMfd2 = page === 'mfd2';
            const tyreHidden = showLastNames || formulaType === 2 || formulaType === 7 || formationLap || paneMode === 1;
            elTyre.style.display = tyreHidden ? 'none' : '';
            if (!tyreHidden) {
                elTyre.style.opacity = (mfdActive && !isMfd2) ? '0' : '1';
                elTyre.style.left    = isMfd2 ? '280px' : '299px';
                tyreRows.forEach(({ text }) => { text.style.fontSize = isMfd2 ? '24px' : '18px'; });
            }
            elDrs.style.display         = (!mfdActive && !showLastNames) ? '' : 'none';

            // ERS battery — hide entire column when toggled off or outside race sessions
            showBattery = !!cfg.showBattery;
            elBattery.style.display     = (showBattery && isRace) ? '' : 'none';

            // Penalty display — race-only; hide all rows when toggled off
            showPenalties = !!cfg.showPenalties;
            if (!showPenalties) {
                penaltyRows.forEach(({ value }) => { value.parentElement.style.display = 'none'; });
            }
        });
    </script>
</body>
</html>
